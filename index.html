<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kalya — come home.</title>
  <meta name="description" content="From loneliness to wholeness, through togetherness. Free Circles, twice daily, worldwide." />
  <meta name="theme-color" content="#F2EDE6" />
  <meta property="og:title" content="kalya — come home." />
  <meta property="og:description" content="From loneliness to wholeness, through togetherness." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kalya.io" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #F2EDE6;
      --surface:       #FFFFFF;
      --text-primary:  #1A1A1A;
      --text-muted:    #9B9590;
      --accent-coral:  #D4756A;
      --accent-purple: #9B8EC4;
      --accent-gold:   #F0C132;
      --border:        rgba(26,26,26,0.10);
    }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .hero {
      width: 100%;
      max-width: 620px;
      padding: 80px 20px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      flex: 1;
      justify-content: center;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      text-transform: lowercase;
      margin-bottom: 24px;
      animation: breath 8s ease-in-out infinite;
    }
    .tagline {
      font-size: 64px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0;
      text-transform: lowercase;
    }
    .promise {
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 460px;
      margin: 0 auto 24px;
    }
    .doors {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 440px;
    }
    .door {
      display: block;
      padding: 20px 24px;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text-primary);
      background: var(--surface);
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      text-align: center;
      transition: border-color 0.4s ease, transform 0.4s ease;
    }
    .door:hover {
      border-color: var(--text-primary);
      transform: translateY(-1px);
    }
    .door-label {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 4px;
      letter-spacing: -0.005em;
    }
    .door-note {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.4;
    }
    .door-arriving .door-label { color: var(--text-muted); }
    .corner-brand {
      position: fixed;
      bottom: 40px;
      right: 36px;
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    footer {
      padding: 40px 20px 60px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    footer a:hover { border-bottom-color: var(--text-muted); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      padding: 44px 36px;
      max-width: 400px;
      width: 100%;
      border-radius: 16px;
      text-align: center;
    }
    .modal h2 {
      font-size: 28px;
      font-weight: 400;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
      text-transform: lowercase;
    }
    .modal p {
      color: var(--text-muted);
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.5;
    }
    .modal input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      color: var(--text-primary);
      box-sizing: border-box;
    }
    .modal input:focus { outline: none; border-color: var(--text-primary); }
    .modal button.primary {
      width: 100%;
      padding: 13px;
      background: var(--accent-gold);
      color: var(--text-primary);
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: opacity 0.3s ease;
    }
    .modal button.primary:hover { opacity: 0.88; }
    .modal button.close {
      background: transparent;
      color: var(--text-muted);
      margin-top: 10px;
      padding: 8px;
      font-size: 13px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    @keyframes breath {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 0.9; }
    }

    @media (max-width: 700px) {
      .tagline { font-size: 44px; }
      .promise { font-size: 17px; }
      .logo-text { font-size: 18px; margin-bottom: 16px; }
      .corner-brand { display: none; }
      .hero { padding: 60px 20px 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-text { animation: none; opacity: 0.75; }
      .door:hover { transform: none; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-text">kalya</div>

    <h1 class="tagline">come home.</h1>

    <p class="promise">from loneliness to wholeness,<br>through togetherness.</p>

    <div class="doors">
      <a href="/circles" class="door">
        <div class="door-label">sit with us →</div>
        <div class="door-note">circles — live now. noon and midnight, worldwide. free forever.</div>
      </a>

      <button class="door door-arriving" onclick="openNotify()" aria-label="notify me when grow with kalya opens">
        <div class="door-label">grow with kalya →</div>
        <div class="door-note">arriving soon. notify me.</div>
      </button>
    </div>
  </div>

  <footer>
    &copy; <span id="year"></span> kalya, 12l12 llc &mdash;
    <a href="mailto:sylvie@kalya.io">sylvie@kalya.io</a>
  </footer>

  <div class="corner-brand">kalya.io</div>

  <div class="modal-backdrop" id="notifyModal" onclick="if(event.target===this)closeNotify()" role="dialog" aria-modal="true" aria-labelledby="notifyTitle">
    <div class="modal">
      <h2 id="notifyTitle">grow with kalya</h2>
      <p>a companion for becoming.<br>we'll let you know when the door opens.</p>
      <form id="notifyForm" onsubmit="return submitWaitlist(event)">
        <input type="email" name="email" id="notifyEmail" placeholder="your email" required autocomplete="email" />
        <button type="submit" class="primary" id="cta-btn">notify me</button>
        <button type="button" class="close" onclick="closeNotify()">close</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function openNotify() {
      document.getElementById('notifyModal').classList.add('open');
      setTimeout(() => document.getElementById('notifyEmail').focus(), 50);
    }

    function closeNotify() {
      document.getElementById('notifyModal').classList.remove('open');
    }

    function submitWaitlist(e) {
      e.preventDefault();
      const email = e.target.email.value.trim();
      if (!email) return false;
      const subject = encodeURIComponent('kalya waitlist');
      const body = encodeURIComponent('please add me to the kalya waitlist: ' + email);
      window.location.href = 'mailto:sylvie@kalya.io?subject=' + subject + '&body=' + body;
      const btn = document.getElementById('cta-btn');
      btn.textContent = 'opening…';
      setTimeout(() => { btn.textContent = 'notify me'; closeNotify(); }, 2500);
      return false;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeNotify();
    });
  </script>
</body>
</html>
