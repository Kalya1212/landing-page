<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalya — From intelligence to compassion.</title>
  <meta name="description" content="Kalya is your compassionate and trustworthy Noble Friend. Explainable AI, curated wisdom, and quiet design for daily calm, clarity, and compassion." />
  <meta name="theme-color" content="#F2EDE6" />
  <meta property="og:title" content="Kalya — From intelligence to compassion." />
  <meta property="og:description" content="Your compassionate and trustworthy Noble Friend." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kalya.io" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #F2EDE6;
      --surface:       #FFFFFF;
      --text-primary:  #1A1A1A;
      --text-muted:    #9B9590;
      --accent-coral:  #D4756A;
      --accent-purple: #9B8EC4;
      --accent-gold:   #F0C132;
      --border:        rgba(26,26,26,0.10);
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .hero {
      width: 100%;
      max-width: 780px;
      padding: 80px 20px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }
    .logo-text {
      font-size: 76px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .tagline {
      font-size: 28px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.35;
    }
    .subtitle {
      font-size: 22px;
      font-weight: 400;
      color: var(--text-muted);
      line-height: 1.45;
      max-width: 520px;
      margin: 0 auto;
    }
    .mission {
      font-size: 19px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto;
    }
    .cta {
      width: 100%;
      max-width: 460px;
      display: flex;
      gap: 12px;
      background: var(--surface);
      padding: 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .cta input {
      flex: 1;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid var(--border);
      background: transparent;
      outline: none;
      color: var(--text-primary);
    }
    .cta input::placeholder {
      color: var(--text-muted);
    }
    .cta button {
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      cursor: pointer;
      background: var(--accent-gold);
      color: var(--text-primary);
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .cta button:hover {
      opacity: 0.88;
    }
    .corner-brand {
      position: fixed;
      bottom: 40px;
      right: 36px;
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    footer {
      margin-top: 60px;
      padding-bottom: 100px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    footer a {
      color: var(--accent-purple);
      text-decoration: underline;
    }
    @media (max-width: 700px) {
      .logo-text { font-size: 52px; }
      .tagline   { font-size: 22px; }
      .subtitle  { font-size: 18px; }
      .mission   { font-size: 16px; }
      .corner-brand { display: none; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo-text">kalya</div>
    <div class="tagline">From intelligence to compassion</div>
    <div class="subtitle">Your compassionate and trustworthy noble friend</div>
    <div class="mission">
      We are building the n°1 trusted AI solution for individuals and communities
      seeking grounded wisdom, mental clarity, and real presence in the digital age.
    </div>
    <form class="cta" id="waitlist" onsubmit="return submitWaitlist(event)">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit" id="cta-btn">Notify me</button>
    </form>
  </div>

  <footer>
    &copy; <span id="year"></span> kalya, 12l12 LLC &mdash;
    <a href="mailto:sylvie@kalya.io">sylvie@kalya.io</a>
  </footer>

  <div class="corner-brand">kalya.io</div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function submitWaitlist(e) {
      e.preventDefault();
      const email = e.target.email.value.trim();
      if (!email) return false;
      const subject = encodeURIComponent('Kalya waitlist');
      const body    = encodeURIComponent('Please add me to the Kalya waitlist: ' + email);
      window.location.href = 'mailto:sylvie@kalya.io?subject=' + subject + '&body=' + body;
      const btn = document.getElementById('cta-btn');
      btn.textContent = 'Opening…';
      setTimeout(() => btn.textContent = 'Notify me', 2500);
      return false;
    }
  </script>

</body>
</html>
