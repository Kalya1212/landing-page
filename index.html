<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalya — Come home.</title>
  <meta name="description" content="From loneliness to wholeness, through togetherness. Free Circles, twice daily, worldwide." />
  <meta name="theme-color" content="#F2EDE6" />
  <meta property="og:title" content="Kalya — Come home." />
  <meta property="og:description" content="From loneliness to wholeness, through togetherness." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kalya.io" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #F2EDE6;
      --surface:       #FFFFFF;
      --text-primary:  #1A1A1A;
      --text-muted:    #9B9590;
      --accent-coral:  #D4756A;
      --accent-purple: #9B8EC4;
      --accent-gold:   #F0C132;
      --border:        rgba(26,26,26,0.10);
    }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .hero {
      width: 100%;
      max-width: 780px;
      padding: 80px 24px 160px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      flex: 1;
      justify-content: center;
    }
    .block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo-text {
      font-size: 76px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.1;
      margin: 0;
    }
    .tagline {
      font-size: 36px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.35;
      margin: 0;
      max-width: 560px;
    }
    .subtitle {
      font-size: 24px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.45;
      margin: 0;
      max-width: 520px;
    }
    .doors {
      display: flex;
      flex-direction: column;
      gap: 44px;
      align-items: center;
      margin-top: 60px;
    }
    .door {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      text-decoration: none;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .door-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.3s ease;
    }
    .door:hover .door-line { opacity: 0.65; }
    .door-label {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .door-sep {
      font-size: 28px;
      font-weight: 300;
      color: var(--text-muted);
    }
    .door-note {
      font-size: 28px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: -0.02em;
    }
    .door-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .dot-gold   { background: var(--accent-gold); }
    .dot-purple { background: var(--accent-purple); }
    .corner-brand {
      position: fixed;
      bottom: 40px;
      right: 36px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.01em;
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      padding: 16px 24px;
      box-sizing: border-box;
      background: var(--bg);
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    footer a:hover { border-bottom-color: var(--text-muted); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      padding: 44px 36px;
      max-width: 400px;
      width: 100%;
      border-radius: 16px;
      text-align: center;
    }
    .modal input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      color: var(--text-primary);
      box-sizing: border-box;
    }
    .modal input:focus { outline: none; border-color: var(--text-primary); }
    .modal button.primary {
      width: 100%;
      padding: 13px 20px;
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: opacity 0.15s;
    }
    .modal button.primary:hover { opacity: 0.8; }
    .modal button.close {
      background: transparent;
      color: var(--text-muted);
      margin-top: 10px;
      padding: 8px;
      font-size: 13px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    @media (max-width: 700px) {
      .logo-text  { font-size: 52px; }
      .tagline    { font-size: 22px; }
      .subtitle   { font-size: 16px; }
      .door-label { font-size: 22px; }
      .door-note  { font-size: 22px; }
      .door-sep   { font-size: 22px; }
      .corner-brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="block">
      <div class="logo-text">kalya</div>
      <div class="tagline">Come home.</div>
      <div class="subtitle">From loneliness to wholeness,<br>through togetherness.</div>
    </div>

    <div class="doors">
      <a href="/circles" class="door">
        <div class="door-line">
          <span class="door-label">kalya Circles</span>
          <span class="door-dot dot-gold"></span>
          <span class="door-sep">&mdash;</span>
          <span class="door-note">Be present.</span>
        </div>
      </a>

      <button class="door" onclick="openNotify()" aria-label="kalya Wholeness — stay aware">
        <div class="door-line">
          <span class="door-label">kalya Wholeness</span>
          <span class="door-dot dot-purple"></span>
          <span class="door-sep">&mdash;</span>
          <span class="door-note">Stay aware.</span>
        </div>
      </button>
    </div>
  </div>

  <footer>
    &copy; <span id="year"></span> kalya&trade; &mdash; 12l12 LLC. All rights reserved.<br>
    <a href="mailto:sylvie@kalya.io">Sylvie Remangeon, Founder &amp; CEO of kalya</a>
  </footer>

  <div class="corner-brand">kalya.io</div>

  <div class="modal-backdrop" id="notifyModal" onclick="if(event.target===this)closeNotify()" role="dialog" aria-modal="true" aria-labelledby="notifyTitle">
    <div class="modal">
      <form id="notifyForm" onsubmit="return submitWaitlist(event)">
        <input type="email" name="email" id="notifyEmail" placeholder="Enter your email" required autocomplete="email" />
        <button type="submit" class="primary" id="cta-btn">Notify me</button>
        <button type="button" class="close" onclick="closeNotify()">close</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function openNotify() {
      document.getElementById('notifyModal').classList.add('open');
      setTimeout(function() { document.getElementById('notifyEmail').focus(); }, 50);
    }
    function closeNotify() {
      document.getElementById('notifyModal').classList.remove('open');
    }
    function submitWaitlist(e) {
      e.preventDefault();
      var email = e.target.email.value.trim();
      if (!email) return false;
      var subject = encodeURIComponent('Kalya waitlist');
      var body = encodeURIComponent('Please add me to the Kalya waitlist: ' + email);
      window.location.href = 'mailto:sylvie@kalya.io?subject=' + subject + '&body=' + body;
      var btn = document.getElementById('cta-btn');
      btn.textContent = 'Opening\u2026';
      setTimeout(function() { btn.textContent = 'Notify me'; closeNotify(); }, 2500);
      return false;
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeNotify();
    });
  </script>
</body>
</html>
